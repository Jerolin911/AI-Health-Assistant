services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
